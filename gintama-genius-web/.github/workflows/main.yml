name: Release-Bot CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install
        working-directory: ./gintama-genius-web

      - name: Run Lint
        run: pnpm run lint
        working-directory: ./gintama-genius-web

      - name: Run Tests
        run: pnpm run test
        working-directory: ./gintama-genius-web

      - name: Build
        run: pnpm run build
        working-directory: ./gintama-genius-web

  release:
    needs: build_and_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Build Docker Container
        run: docker build -f ../Dockerfile -t gintama-genius-web .
        working-directory: ./gintama-genius-web

      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm exec semantic-release
